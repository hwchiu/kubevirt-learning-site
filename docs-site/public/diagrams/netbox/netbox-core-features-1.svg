<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <style>
      .box { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; }
      .decision { fill: #fff4ed; stroke: #fed7aa; stroke-width: 1.5; }
      .start { fill: #f0f4ff; stroke: #c7d2fe; stroke-width: 1.5; }
      .text-title { fill: #111827; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 600; }
      .text-small { fill: #6b7280; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; }
      .text-label { fill: #111827; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; }
      .line { stroke: #3b82f6; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Start -->
  <rect class="start" x="400" y="30" width="200" height="50" rx="4"/>
  <text class="text-title" x="500" y="60" text-anchor="middle">Prefix save/delete</text>

  <!-- Decision -->
  <path class="decision" d="M 500 130 L 600 180 L 500 230 L 400 180 Z"/>
  <text class="text-title" x="500" y="175" text-anchor="middle">是否為新建</text>
  <text class="text-title" x="500" y="195" text-anchor="middle">或變更?</text>

  <!-- Arrow start to decision -->
  <path class="line" d="M 500 80 L 500 130" marker-end="url(#arrow)"/>

  <!-- Left branch: update_parents_children -->
  <rect class="box" x="100" y="280" width="200" height="50" rx="4"/>
  <text class="text-title" x="200" y="310" text-anchor="middle">update_parents_children</text>

  <!-- Arrow decision to left -->
  <path class="line" d="M 400 180 L 250 280" marker-end="url(#arrow)"/>
  <text class="text-label" x="310" y="220">是</text>

  <!-- Right branch: update_children_depth -->
  <rect class="box" x="700" y="280" width="200" height="50" rx="4"/>
  <text class="text-title" x="800" y="310" text-anchor="middle">update_children_depth</text>

  <!-- Arrow decision to right -->
  <path class="line" d="M 600 180 L 750 280" marker-end="url(#arrow)"/>
  <text class="text-label" x="680" y="220">是</text>

  <!-- Left flow -->
  <rect class="box" x="80" y="380" width="240" height="50" rx="4"/>
  <text class="text-small" x="200" y="400" text-anchor="middle">查詢所有 parent prefixes</text>
  <text class="text-small" x="200" y="418" text-anchor="middle">annotate_hierarchy</text>

  <path class="line" d="M 200 330 L 200 380" marker-end="url(#arrow)"/>

  <rect class="box" x="100" y="470" width="200" height="50" rx="4"/>
  <text class="text-title" x="200" y="500" text-anchor="middle">bulk_update _children 欄位</text>

  <path class="line" d="M 200 430 L 200 470" marker-end="url(#arrow)"/>

  <!-- Right flow -->
  <rect class="box" x="680" y="380" width="240" height="50" rx="4"/>
  <text class="text-small" x="800" y="400" text-anchor="middle">查詢所有 child prefixes</text>
  <text class="text-small" x="800" y="418" text-anchor="middle">annotate_hierarchy</text>

  <path class="line" d="M 800 330 L 800 380" marker-end="url(#arrow)"/>

  <rect class="box" x="700" y="470" width="200" height="50" rx="4"/>
  <text class="text-title" x="800" y="500" text-anchor="middle">bulk_update _depth 欄位</text>

  <path class="line" d="M 800 430 L 800 470" marker-end="url(#arrow)"/>

  <!-- Skip branch -->
  <rect class="box" x="420" y="280" width="160" height="50" rx="4"/>
  <text class="text-title" x="500" y="310" text-anchor="middle">跳過更新</text>

  <path class="line" d="M 500 230 L 500 280" marker-end="url(#arrow)"/>
  <text class="text-label" x="510" y="260">否</text>

  <!-- Modified prefix branch -->
  <rect class="box" x="380" y="380" width="240" height="50" rx="4"/>
  <text class="text-small" x="500" y="400" text-anchor="middle">修改且 prefix 改變</text>
  <text class="text-small" x="500" y="418" text-anchor="middle">對舊 prefix 也執行更新</text>

  <path class="line" d="M 500 330 L 500 380" marker-end="url(#arrow)"/>

  <!-- Arrows from modified to both updates -->
  <path class="line" d="M 380 405 L 250 280" marker-end="url(#arrow)"/>
  <path class="line" d="M 620 405 L 750 280" marker-end="url(#arrow)"/>

</svg>