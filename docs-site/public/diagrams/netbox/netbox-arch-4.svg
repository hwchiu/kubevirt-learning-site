<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="750" version="1.1" width="600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#3b82f6" points="0,0 10,3.5 0,7" /></marker></defs><rect fill="#ffffff" height="750" width="600" x="0" y="0" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="300.0" y="30">upgrade.sh 升級流程</text><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="55" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="77.0">1. 檢查 Python ≥ 3.12</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="91" y2="99" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="101" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="123.0">2. 建立 / 重建 virtualenv</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="137" y2="145" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="147" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="169.0">3. 升級 pip</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="183" y2="191" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="193" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="215.0">4. 安裝 wheel</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="229" y2="237" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="239" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="261.0">5. 安裝 requirements.txt</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="275" y2="283" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="285" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="307.0">6. 安裝 local_requirements.txt（若存在）</text><polygon fill="#f0f4ff" points="300.0,341 400.0,361.0 300.0,381 200.0,361.0" stroke="#c7d2fe" stroke-width="1.5" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="365.0">--readonly?</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="339" y2="339" /><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="330.0" y1="381" y2="389" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="180" x="240.0" y="391" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="330.0" y="405">7. 執行 Database</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="330.0" y="419">Migrations</text><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" x="270.0" y="401">No</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="400.0" x2="440.0" y1="361.0" y2="389" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#fbbf24" stroke-width="1.5" width="120" x="380.0" y="391" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="440.0" y="405">跳過</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="440.0" y="419">資料庫變更</text><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" x="408.0" y="361.0">Yes</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="330.0" x2="300.0" y1="427" y2="440" /><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="440.0" x2="300.0" y1="427" y2="440" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="442" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="464.0">8. Trace 遺漏的 Cable Paths</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="478" y2="486" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="488" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="510.0">9. 建構 MkDocs 文件</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="524" y2="532" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="534" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="556.0">10. collectstatic 收集靜態檔案</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="570" y2="578" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="580" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="602.0">11. 移除過期 Content Types</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="616" y2="624" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="626" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="648.0">12. 重建搜尋索引（lazy）</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="662" y2="670" /><rect fill="#f9fafb" height="36" rx="5" ry="5" stroke="#e5e7eb" stroke-width="1.5" width="340" x="130.0" y="672" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="694.0">13. 清除過期 Sessions</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="1.5" x1="300.0" x2="300.0" y1="708" y2="716" /><rect fill="#f0f4ff" height="36" rx="5" ry="5" stroke="#c7d2fe" stroke-width="1.5" width="340" x="130.0" y="718" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="middle" x="300.0" y="740.0">14. 完成，提示重啟服務</text></svg>