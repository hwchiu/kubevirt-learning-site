<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 9 3.5, 0 6.5" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <text x="600" y="36" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Compaction vs Defrag: Space Semantics</text>
  <text x="600" y="62" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">in-use drops after compaction; physical db size drops after defrag</text>

  <rect x="70" y="110" width="300" height="250" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="220" y="142" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Phase 1: Writes and historical revision buildup</text>
  <rect x="120" y="180" width="200" height="120" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="220" y="212" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">bbolt DB file</text>
  <text x="220" y="236" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Used pages + old revisions</text>
  <text x="220" y="255" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">db_total_size grows</text>
  <text x="220" y="274" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">db_total_size_in_use also grows</text>

  <rect x="430" y="110" width="330" height="250" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="595" y="142" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Phase 2: Compact</text>
  <rect x="485" y="180" width="220" height="120" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="595" y="212" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Old revisions are removed</text>
  <text x="595" y="236" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Pages become reusable free pages</text>
  <text x="595" y="255" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">db_total_size_in_use drops</text>
  <text x="595" y="274" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">db_total_size barely changes</text>

  <rect x="820" y="110" width="310" height="250" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="975" y="142" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Phase 3: Defrag</text>
  <rect x="875" y="180" width="200" height="120" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="975" y="212" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Rewrite into a new DB file</text>
  <text x="975" y="236" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Keep only live data</text>
  <text x="975" y="255" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">db_total_size drops</text>
  <text x="975" y="274" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Free pages finally return to the filesystem</text>

  <line x1="320" y1="240" x2="485" y2="240" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="705" y1="240" x2="875" y2="240" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="120" y="420" width="1010" height="180" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="625" y="455" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Two Metrics Commonly Watched in Kubernetes</text>

  <rect x="170" y="490" width="420" height="75" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="380" y="520" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">etcd_mvcc_db_total_size_in_use_in_bytes</text>
  <text x="380" y="544" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Logical size still used by live data</text>

  <rect x="660" y="490" width="420" height="75" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="870" y="520" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">etcd_mvcc_db_total_size_in_bytes</text>
  <text x="870" y="544" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Physical disk size of the DB file</text>

  <text x="380" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#1d4ed8" text-anchor="middle">Compaction mainly affects this value</text>
  <text x="870" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">Defrag mainly affects this value</text>

</svg>
