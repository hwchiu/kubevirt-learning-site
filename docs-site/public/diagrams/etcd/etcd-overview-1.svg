<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 9 3.5, 0 6.5" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 9 3.5, 0 6.5" fill="#059669"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <text x="540" y="36" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Role of etcd in Kubernetes</text>
  <text x="540" y="62" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">All API server state eventually lands in etcd and is protected by Raft replication</text>

  <rect x="80" y="110" width="210" height="90" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="185" y="145" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">kube-apiserver</text>
  <text x="185" y="168" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">CRUD / Watch / Lease / Event</text>
  <text x="185" y="186" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Primary write path</text>

  <rect x="360" y="95" width="610" height="355" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="665" y="128" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="middle">Primary etcd Raft Cluster</text>
  <text x="665" y="150" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">All members share one cluster membership and one quorum boundary</text>

  <rect x="405" y="190" width="190" height="92" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="500" y="223" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Leader</text>
  <text x="500" y="246" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Accepts writes</text>
  <text x="500" y="264" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Replicates Raft log</text>

  <rect x="575" y="320" width="180" height="90" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="665" y="352" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Follower</text>
  <text x="665" y="375" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">voter</text>
  <text x="665" y="393" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Participates in quorum</text>

  <rect x="770" y="320" width="160" height="90" rx="12" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="850" y="352" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Follower</text>
  <text x="850" y="375" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">voter</text>
  <text x="850" y="393" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="middle">Participates in quorum</text>

  <line x1="290" y1="155" x2="405" y2="225" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="348" y="140" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">gRPC / MVCC</text>
  <line x1="515" y1="282" x2="620" y2="320" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="545" y1="282" x2="810" y2="320" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="615" y="297" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">raft log</text>
  <text x="760" y="297" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">raft log</text>

  <rect x="110" y="295" width="180" height="120" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="200" y="328" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Watchers / Controllers</text>
  <text x="200" y="350" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">kube-controller-manager</text>
  <text x="200" y="367" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">scheduler / operators</text>
  <text x="200" y="390" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">Observe state via API server</text>

  <line x1="200" y1="295" x2="200" y2="200" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="225" y="248" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="start">Watch / List</text>

  <rect x="120" y="510" width="860" height="160" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="550" y="545" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Chapter Focus</text>

  <rect x="160" y="575" width="235" height="68" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="278" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Defrag / Compact</text>
  <text x="278" y="624" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">MVCC space reclamation and disk size</text>

  <rect x="425" y="575" width="235" height="68" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="543" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Kubernetes Operations</text>
  <text x="543" y="624" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">One-member-at-a-time defrag and control-plane impact</text>

  <rect x="690" y="575" width="250" height="68" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="815" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Learner Mode</text>
  <text x="815" y="624" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">Sync data first, change the voting set later</text>

</svg>
