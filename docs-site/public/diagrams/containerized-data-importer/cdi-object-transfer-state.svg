<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5,8.5 3.5,0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="980" height="320" fill="#ffffff"/>
  <text x="490" y="32" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">ObjectTransfer 狀態機</text>

  <circle cx="60" cy="160" r="10" fill="#111827"/>

  <rect x="115" y="138" width="130" height="44" rx="20" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="180" y="160" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Empty</text>
  <rect x="285" y="138" width="130" height="44" rx="20" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="350" y="152" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Pending</text>
<text x="350" y="172" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">加入 Finalizer</text>
  <rect x="455" y="138" width="150" height="44" rx="20" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="530" y="152" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Running</text>
<text x="530" y="172" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">執行 Transfer Handler</text>
  <rect x="665" y="78" width="150" height="44" rx="20" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
<text x="740" y="92" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Complete</text>
<text x="740" y="112" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">轉移完成</text>
  <rect x="665" y="198" width="150" height="44" rx="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
<text x="740" y="212" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Error</text>
<text x="740" y="232" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">可重試</text>

  <line x1="70" y1="160" x2="115" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="95" y="148" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">建立 ObjectTransfer</text>
  <line x1="245" y1="160" x2="285" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="265" y="148" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">加上 finalizer</text>
  <line x1="415" y1="160" x2="455" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="435" y="148" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">ReconcilePending()</text>
  <line x1="605" y1="148" x2="665" y2="112" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="640" y="120" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">完成</text>
  <line x1="605" y1="172" x2="665" y2="208" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="640" y="206" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">錯誤</text>
  <line x1="740" y1="198" x2="740" y2="124" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="770" y="164" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">重試</text>
  <line x1="815" y1="100" x2="900" y2="100" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="860" y="88" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">reconcileCleanup()</text>

  <circle cx="930" cy="100" r="13" fill="#ffffff" stroke="#111827" stroke-width="2.5"/>
  <circle cx="930" cy="100" r="8" fill="#111827"/>
</svg>
