<rect x="80" y="380" width="540" height="26" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="350" y="397" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#92400e">持續按需傳送，直到所有頁面都到達目標端</text>
</svg>