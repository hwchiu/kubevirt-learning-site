<text x="240" y="188" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">Pre-Running</text>
<rect x="600" y="230" width="160" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="680" y="257" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#111827">dom.AbortJob</text>
<line x1="510" y1="150" x2="640" y2="230" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="560" y="188" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">Running</text>
<polygon points="680,315 770,345 680,375 590,345" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="680" y="350" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#4c1d95">Abort 成功?</text>
<line x1="680" y1="274" x2="680" y2="315" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="550" y="420" width="160" height="44" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="630" y="447" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">AbortStatus = Succeeded</text>
<line x1="600" y1="345" x2="610" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="584" y="381" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">是</text>
<rect x="740" y="420" width="160" height="44" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="820" y="447" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">AbortStatus = Failed</text>
<line x1="760" y1="345" x2="820" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="786" y="381" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">否</text>
<rect x="550" y="490" width="160" height="40" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="630" y="515" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">清理 Target Pod</text>
