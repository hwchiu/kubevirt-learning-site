<svg xmlns="http://www.w3.org/2000/svg" width="860" height="540" viewBox="0 0 860 540">
<rect width="860" height="540" fill="#ffffff"/>
<defs><marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="3.5" orient="auto"><polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/></marker></defs>
<text x="430" y="30" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Migration Abort &amp; Cleanup Flow</text>
<rect x="330" y="50" width="200" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="430" y="77" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827">Abort 請求</text>
<polygon points="430,120 530,150 430,180 330,150" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="430" y="155" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#4c1d95">遷移階段?</text>
<line x1="430" y1="94" x2="430" y2="120" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="80" y="230" width="160" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="160" y="257" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#111827">刪除 Target Pod</text>
