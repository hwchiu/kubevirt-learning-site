<rect x="740" y="490" width="160" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="820" y="515" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#111827">重試或標記失敗</text>
<line x1="820" y1="464" x2="820" y2="490" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="100" y="340" width="200" height="44" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="200" y="367" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#111827">VMI 繼續在源端運行</text>
<line x1="160" y1="274" x2="200" y2="340" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="630" y1="530" x2="200" y2="362" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>