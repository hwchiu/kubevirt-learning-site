<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
  </marker>
</defs>

<rect width="1000" height="900" fill="#ffffff"/>

<!-- Start -->
<circle cx="100" cy="50" r="15" fill="#111827"/>
<circle cx="100" cy="50" r="10" fill="#ffffff"/>
<line x1="100" y1="65" x2="100" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="160" y="95" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">系統穩定運行</text>

<!-- State 1: Stable -->
<rect x="50" y="120" width="300" height="140" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
<text x="60" y="145" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Stable</text>
<text x="200" y="175" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Available = True</text>
<text x="200" y="205" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Progressing = False</text>
<text x="200" y="235" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Degraded = False</text>

<!-- Transition 1 -->
<line x1="350" y1="190" x2="450" y2="190" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="175" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">使用者更新</text>
<text x="400" y="190" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">KubeVirt CR spec</text>

<!-- State 2: UpgradeDetected -->
<rect x="450" y="120" width="300" height="140" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
<text x="460" y="145" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">UpgradeDetected</text>
<text x="600" y="175" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Progressing = True</text>
<text x="600" y="205" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Available = True (暫時)</text>
<text x="600" y="235" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">outdatedVirtualMachineInstanceWorkloads > 0</text>

<!-- Transition 2 -->
<line x1="600" y1="260" x2="600" y2="320" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="660" y="285" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">virt-operator 建立</text>
<text x="660" y="300" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">InstallStrategy Job</text>

<!-- State 3: InstallStrategyPhase -->
<rect x="450" y="320" width="300" height="120" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
<text x="460" y="345" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">InstallStrategyPhase</text>
<text x="600" y="375" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">InstallStrategy Job 執行中</text>
<text x="600" y="405" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">產生新版 ConfigMap</text>

<!-- Transition 3 -->
<line x1="600" y1="440" x2="600" y2="500" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="660" y="475" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">ConfigMap 就緒</text>

<!-- State 4: ComponentUpdate -->
<rect x="450" y="500" width="300" height="140" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
<text x="460" y="525" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">ComponentUpdate</text>
<text x="600" y="555" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">virt-api 滾動更新</text>
<text x="600" y="585" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">virt-controller 滾動更新</text>
<text x="600" y="615" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">virt-handler 逐節點更新</text>

<!-- Transition 4 -->
<line x1="450" y1="570" x2="350" y2="570" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="400" y="555" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">元件更新完成</text>

<!-- State 5: WorkloadMigration -->
<rect x="50" y="500" width="300" height="140" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
<text x="60" y="525" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">WorkloadMigration</text>
<text x="200" y="555" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">WorkloadUpdateController 偵測過時 VMI</text>
<text x="200" y="585" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">LiveMigrate / Evict 執行中</text>
<text x="200" y="615" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">outdatedVMI 計數器遞減</text>

<!-- Transition 5 back to Stable -->
<line x1="200" y1="500" x2="200" y2="260" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="50" y="370" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">所有 VMI 已更新完成</text>
<text x="50" y="385" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">outdatedVMI = 0</text>

</svg>