<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 313" width="960" height="313">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" markerWidth="9" markerHeight="7" refX="0.5" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="313" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#6b7280" letter-spacing="0.5">裝置管理器 — DEVICE PLUGIN 生命週期</text>
  <rect x="160" y="45" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="71" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">1. virt-handler 啟動時掃描節點裝置</text>
  <line x1="480" y1="89" x2="480" y2="107" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="107" width="640" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="133" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">2. DeviceController 為每種裝置類型建立 Device Plugin</text>
  <text x="480" y="151" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">plugin.Start() — 建立 gRPC server + 監聽 Unix socket</text>
  <text x="480" y="167" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">plugin.Register() — 向 kubelet 註冊</text>
  <line x1="480" y1="187" x2="480" y2="205" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="205" width="640" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="231" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">3. kubelet 排程 Pod 時呼叫 gRPC Allocate()</text>
  <text x="480" y="249" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">回傳裝置路徑、環境變數</text>
  <text x="480" y="265" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">Pod 啟動時掛載裝置</text>
</svg>
