<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 360" width="660" height="360">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" markerWidth="9" markerHeight="7" refX="0.5" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="660" height="360" fill="#ffffff"/>
  <rect x="220" y="20" width="220" height="46" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="330" y="46" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">DataVolume（宣告）</text>
  <path d="M 280 66 L 280 100 L 140 100 L 140 120" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="120" width="160" height="46" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="140" y="146" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">建立 PVC</text>
  <text x="140" y="164" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">（實際儲存）</text>
  <line x1="140" y1="166" x2="140" y2="188" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="188" width="200" height="42" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="140" y="214" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">StorageClass</text>
  <text x="140" y="232" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">決定的後端 PV</text>
  <path d="M 380 66 L 380 100 L 500 100 L 500 120" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="120" width="240" height="46" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="146" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Importer/Cloner Pod</text>
  <text x="500" y="164" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">（資料搬運）</text>
  <line x1="500" y1="166" x2="500" y2="178" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="178" width="240" height="28" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="204" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">HTTP Importer</text>
  <text x="500" y="222" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">從 URL 下載映像</text>
  <line x1="500" y1="196" x2="500" y2="208" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="208" width="240" height="28" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="234" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">S3 Importer</text>
  <text x="500" y="252" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">從 S3 下載映像</text>
  <line x1="500" y1="226" x2="500" y2="238" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="238" width="240" height="28" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="264" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">PVC Cloner</text>
  <text x="500" y="282" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">從現有 PVC 克隆</text>
  <line x1="500" y1="256" x2="500" y2="268" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="268" width="240" height="28" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="294" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Registry Importer</text>
  <text x="500" y="312" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">從 ContainerDisk 轉換</text>
  <line x1="500" y1="286" x2="500" y2="298" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="298" width="240" height="28" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="324" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Upload Server</text>
  <text x="500" y="342" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">等待 virtctl 上傳</text>
</svg>
