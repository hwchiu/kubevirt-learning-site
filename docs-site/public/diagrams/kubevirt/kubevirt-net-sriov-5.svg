<svg baseProfile="full" height="650px" version="1.1" width="1000px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><polygon fill="#3b82f6" points="0,0.5 8.5,3.5 0,6.5" /></defs><rect fill="#ffffff" height="100%" width="100%" x="0" y="0" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" x="500" y="40">SR-IOV 使用決策樹</text><path d="M 400,80 L 500,120 L 600,80 L 500,40 Z" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle" x="500" y="105">需要 Live Migration？</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="400" x2="200" y1="100" y2="170" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" x="290" y="130">是</text><rect fill="#ef4444" height="80" opacity="0.9" rx="6" stroke="#e5e7eb" stroke-width="1.5" width="300" x="50" y="170" /><text fill="#ffffff" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" x="200" y="200">❌ 不能使用 SR-IOV</text><text fill="#ffffff" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" text-anchor="middle" x="200" y="225">改用 Bridge 或 Masquerade</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="600" x2="750" y1="100" y2="200" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" x="680" y="145">否</text><path d="M 650,200 L 750,240 L 850,200 L 750,160 Z" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle" x="750" y="205">硬體支援 SR-IOV？</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="850" x2="920" y1="220" y2="300" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" x="890" y="255">否</text><rect fill="#f9fafb" height="80" rx="6" stroke="#e5e7eb" stroke-width="1.5" width="240" x="800" y="300" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" text-anchor="middle" x="920" y="330">考慮 DPDK + vhost-user</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" text-anchor="middle" x="920" y="355">或 Passt</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="750" x2="750" y1="240" y2="320" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" x="760" y="275">是</text><path d="M 650,320 L 750,360 L 850,320 L 750,280 Z" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle" x="750" y="325">IOMMU 已啟用？</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="650" x2="500" y1="340" y2="430" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" x="570" y="380">否</text><rect fill="#f9fafb" height="80" rx="6" stroke="#e5e7eb" stroke-width="1.5" width="300" x="350" y="430" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" text-anchor="middle" x="500" y="475">先啟用 IOMMU 再評估</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="750" x2="750" y1="360" y2="480" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" x="760" y="415">是</text><rect fill="#10b981" height="80" opacity="0.9" rx="6" stroke="#e5e7eb" stroke-width="1.5" width="300" x="600" y="480" /><text fill="#ffffff" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle" x="750" y="525">✅ 可以使用 SR-IOV</text></svg>