<line x1="510" y1="552" x2="510" y2="565" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="900" y1="580" x2="1000" y2="580" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="940" y="570" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">完成</text>
<rect x="1000" y="330" width="280" height="64" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/><text x="1140.0" y="358.0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">libvirt DomainDefine</text><text x="1140.0" y="375.0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">寫入 Domain XML</text>
<rect x="1000" y="430" width="280" height="64" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/><text x="1140.0" y="458.0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">DomainCreate</text><text x="1140.0" y="475.0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">啟動 QEMU</text>
<line x1="1140" y1="394" x2="1140" y2="430" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M900,580 L1140,580 L1140,330" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>