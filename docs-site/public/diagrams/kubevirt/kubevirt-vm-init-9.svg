<line x1="570" y1="87" x2="600" y2="87" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="720" y1="109" x2="720" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="135" width="860" height="420" rx="10" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6,3"/><text x="92" y="153" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" font-weight="600">preStartHook() 執行序列</text>
<rect x="120" y="165" width="780" height="44" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/><text x="510.0" y="191.5" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">1. 確認 cloudinit 資料就緒</text>
<rect x="120" y="225" width="780" height="52" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/><text x="510.0" y="247.0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">2. generateCloudInitISO</text><text x="510.0" y="264.0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">生成 NoCloud ISO or ConfigDrive</text>
<line x1="510" y1="209" x2="510" y2="225" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="120" y="310" width="780" height="64" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/><text x="510.0" y="329.5" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">3. 執行 Hook Sidecars</text><text x="510.0" y="346.5" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">透過 gRPC</text><text x="510.0" y="363.5" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">讓外部插件修改 Domain XML</text>
