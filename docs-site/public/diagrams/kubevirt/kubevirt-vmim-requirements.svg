<rect width="1200" height="540" fill="#ffffff"/>
<text x="600" y="30" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#111827" text-anchor="middle" font-weight="700">VMI Live Migration 必要條件檢查</text>
<polygon points="420,170 510,200 420,230 330,200" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="420" y="194" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle" font-weight="700">VMI</text>
<text x="420" y="210" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle" font-weight="700">可以 Live Migrate?</text>
