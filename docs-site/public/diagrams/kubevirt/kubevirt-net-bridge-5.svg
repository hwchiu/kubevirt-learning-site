<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500" version="1.1" width="960" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#ffffff" height="500" width="960" x="0" y="0" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle" x="480" y="36">Phase 1 vs Phase 2 — 三種模式對比</text><rect fill="#dbeafe" height="400" rx="10" ry="10" stroke="#3b82f6" stroke-width="1.5" width="290" x="40" y="60" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" x="185" y="84">Bridge 模式</text><rect fill="#fff" height="140" rx="8" ry="8" stroke="#3b82f6" stroke-width="1.5" width="260" x="55" y="100" /><text fill="#1d4ed8" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="185" y="118">Phase 1（特權）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="141">1. 建立 bridge k6t-eth0</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="156">2. 移除 eth0 的 Pod IP</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="171">3. 設定 bridge IP</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="186">4. 設定 ARP proxy</text><line stroke="#3b82f6" stroke-width="2" x1="185" x2="185" y1="240" y2="270" /><polygon fill="#3b82f6" points="185,270 180,260 190,260" /><rect fill="#fff" height="155" rx="8" ry="8" stroke="#6b7280" stroke-width="1.5" width="260" x="55" y="270" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="185" y="288">Phase 2（非特權）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="311">1. 設定 libvirt XML 使用 bridge</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="326">2. 建立 tap 介面</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="341">3. 連接 tap 到 bridge</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="65" y="356">4. 啟動 QEMU</text><rect fill="#fef3c7" height="400" rx="10" ry="10" stroke="#f59e0b" stroke-width="1.5" width="290" x="370" y="60" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" x="515" y="84">Masquerade 模式</text><rect fill="#fff" height="120" rx="8" ry="8" stroke="#f59e0b" stroke-width="1.5" width="260" x="385" y="100" /><text fill="#92400e" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="515" y="118">Phase 1（特權）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="144">1. 設定 nftables MASQUERADE</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="159">2. 設定 nftables DNAT（ports）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="174">3. 設定 IPv6 規則（如適用）</text><line stroke="#3b82f6" stroke-width="2" x1="515" x2="515" y1="220" y2="250" /><polygon fill="#3b82f6" points="515,250 510,240 520,240" /><rect fill="#fff" height="175" rx="8" ry="8" stroke="#6b7280" stroke-width="1.5" width="260" x="385" y="250" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="515" y="268">Phase 2（非特權）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="291">1. 設定 libvirt XML 使用 tap</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="306">2. 建立 tap 介面</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="321">3. 啟動內建 DHCP server</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="395" y="336">4. 啟動 QEMU</text><rect fill="#f0fdf4" height="400" rx="10" ry="10" stroke="#86efac" stroke-width="1.5" width="290" x="700" y="60" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" x="845" y="84">Passt 模式（對比）</text><rect fill="#f1f5f9" height="80" rx="8" ry="8" stroke="#94a3b8" stroke-width="1.5" width="260" x="715" y="100" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="845" y="123">Phase 1</text><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" x="845" y="148">❌ 不需要（無特權操作）</text><line stroke="#6b7280" stroke-dasharray="6,4" stroke-width="1.5" x1="845" x2="845" y1="180" y2="215" /><polygon fill="#6b7280" points="845,215 840,205 850,205" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start" x="875" y="202">直接跳過</text><rect fill="#fff" height="190" rx="8" ry="8" stroke="#6b7280" stroke-width="1.5" width="260" x="715" y="215" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="845" y="233">Phase 2（非特權）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="725" y="259">1. 啟動 passt 程式（userspace）</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="725" y="274">2. 設定 libvirt XML 使用 passt</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" text-anchor="start" x="725" y="289">3. 啟動 QEMU</text><rect fill="#dcfce7" height="60" rx="8" ry="8" stroke="#22c55e" stroke-width="1.5" width="260" x="715" y="370" /><text fill="#166534" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="845" y="403">✅ 完全無特權操作</text></svg>