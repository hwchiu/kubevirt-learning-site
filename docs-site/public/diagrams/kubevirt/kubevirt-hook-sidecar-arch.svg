  <text x="415" y="354" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">/var/run/kubevirt-hooks/</text>
  <text x="415" y="368" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">   sidecar-1.sock</text>
