  <text x="662" y="321" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#c7d2fe" letter-spacing="0.5">HOOK-SIDECAR-2</text>
  <text x="665" y="338" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">gRPC server</text>
  <text x="665" y="354" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">/var/run/kubevirt-hooks/</text>
  <text x="665" y="368" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">   sidecar-2.sock</text>
