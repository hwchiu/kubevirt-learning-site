  <rect x="230" y="112" width="500" height="56" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="138" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">VMI (with hook annotation)</text>
  <text x="480" y="156" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">annotations: hooks.kubevirt.io/hookSidecars</text>
  <line x1="480" y1="168" x2="480" y2="196" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="230" y="196" width="500" height="56" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="222" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">virt-controller</text>
  <text x="480" y="240" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">建立 virt-launcher Pod + hook sidecar containers</text>
  <line x1="480" y1="252" x2="480" y2="280" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
