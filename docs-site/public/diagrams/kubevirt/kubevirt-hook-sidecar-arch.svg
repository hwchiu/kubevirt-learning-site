  <text x="385" y="357" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">gRPC</text>
  <line x1="370" y1="380" x2="650" y2="370" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="367" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">gRPC</text>
