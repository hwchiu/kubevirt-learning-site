  <text x="72" y="296" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#c7d2fe" letter-spacing="0.5">VIRT-LAUNCHER POD</text>
  <rect x="90" y="305" width="280" height="200" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="102" y="321" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#c7d2fe" letter-spacing="0.5">VIRT-LAUNCHER</text>
  <text x="105" y="330" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">1. 掃描 /var/run/kubevirt-hooks/</text>
  <text x="105" y="352" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">2. 呼叫 Info() RPC</text>
  <text x="105" y="374" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">3. 呼叫 Hook (OnDefineDomain)</text>
  <text x="105" y="396" text-anchor="start" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">4. 啟動 QEMU</text>
