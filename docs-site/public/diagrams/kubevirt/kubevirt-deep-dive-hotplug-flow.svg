<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 499" width="960" height="499">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" markerWidth="9" markerHeight="7" refX="0.5" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="499" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#6b7280" letter-spacing="0.5">熱插拔 — VOLUME 熱插拔運作流程</text>
  <rect x="160" y="45" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="71" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">1. 使用者透過 virtctl 新增 Volume</text>
  <line x1="480" y1="89" x2="480" y2="107" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="107" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="133" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">2. virt-controller 偵測 VMI spec 變更</text>
  <line x1="480" y1="151" x2="480" y2="169" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="169" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="195" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">3. 建立 Attachment Pod（包含新 Volume 的 kubelet mount）</text>
  <line x1="480" y1="213" x2="480" y2="231" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="231" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="257" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">4. 等待 Attachment Pod Running</text>
  <line x1="480" y1="275" x2="480" y2="293" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="293" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="319" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">5. virt-handler 偵測到新的 volume mount</text>
  <line x1="480" y1="337" x2="480" y2="355" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="355" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="381" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">6. 通知 virt-launcher 執行 libvirt attach-device</text>
  <line x1="480" y1="399" x2="480" y2="417" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="417" width="640" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="443" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">7. 更新 VMI.Status.VolumeStatus</text>
