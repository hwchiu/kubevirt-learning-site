<line x1="520" y1="570" x2="720" y2="570" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,5" marker-start="url(#arrow-return)"/>
<text x="620.0" y="553" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">確認凍結</text>
