<rect width="1400" height="900" fill="#ffffff"/>

<text x="700" y="40" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827" text-anchor="middle">virt-freezer 檔案系統凍結流程</text>
<rect x="50.0" y="80" width="140" height="50" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/><text x="120" y="98" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#111827" text-anchor="middle">Snapshot</text><text x="120" y="111" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#111827" text-anchor="middle">Controller</text>
