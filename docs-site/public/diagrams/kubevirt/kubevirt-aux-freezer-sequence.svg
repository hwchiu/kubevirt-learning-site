<text x="420.0" y="802" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">gRPC 連接</text>
<line x1="520" y1="870" x2="720" y2="870" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="620.0" y="862" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">發送 QMP 命令</text>
