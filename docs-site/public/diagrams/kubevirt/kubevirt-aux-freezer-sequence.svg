<line x1="120" y1="1030" x2="1120" y2="1030" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,5" marker-start="url(#arrow-return)"/>
<text x="620.0" y="1022" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">I/O 已恢復</text>
