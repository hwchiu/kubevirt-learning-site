  <text x="368" y="492" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">啟動 Importer Pod（同節點）</text>
  <line x1="280" y1="560" x2="100" y2="560" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="190.0" y="552" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">phase = ImportInProgress → Succeeded</text>
  <rect x="60" y="600" width="840" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="480" y="616" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">重點：先由 Scheduler 決定節點，再讓 PVC binding 與 Importer Pod 在同節點完成。</text>
