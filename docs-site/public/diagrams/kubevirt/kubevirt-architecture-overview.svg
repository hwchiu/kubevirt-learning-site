<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" markerWidth="9" markerHeight="7" refX="0.5" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="650" fill="#ffffff"/>
  <rect x="155" y="40" width="650" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="480" y="66" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Kubernetes API Server</text>
  <text x="480" y="84" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">儲存所有 CRD：VM, VMI, Migration, Snapshot...</text>
  <rect x="30" y="190" width="230" height="155" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="145" y="216" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">virt-api</text>
  <text x="145" y="234" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">Deployment × N</text>
  <text x="145" y="250" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">• REST API 入口 &amp; Admission Webhook</text>
  <text x="145" y="266" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">• Console / VNC Proxy</text>
  <rect x="700" y="190" width="230" height="155" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="815" y="216" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">virt-controller</text>
  <text x="815" y="234" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">Deployment × N</text>
  <text x="815" y="250" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">• VM / VMI 控制器</text>
  <text x="815" y="266" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">• Migration / Snapshot 控制器</text>
  <rect x="350" y="340" width="540" height="230" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="362" y="356" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#c7d2fe" letter-spacing="0.5">VIRT-LAUNCHER POD  (×每個 VMI)</text>
  <rect x="370" y="365" width="500" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="620" y="391" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">virt-launcher 程序</text>
  <text x="620" y="409" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">接收命令、轉發指令至 libvirtd</text>
  <rect x="370" y="445" width="500" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="620" y="471" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">libvirtd + QEMU</text>
  <text x="620" y="489" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">實際執行 VM 的 Hypervisor 程序</text>
  <rect x="30" y="420" width="230" height="140" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="145" y="446" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">virt-handler</text>
  <text x="145" y="464" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">DaemonSet（每節點一個）</text>
  <text x="145" y="480" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">• 同步 VMI 狀態至 libvirt</text>
  <text x="145" y="496" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">• 管理網路 / 儲存</text>
  <rect x="350" y="598" width="260" height="28" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="480" y="617" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" fill="#6b7280">virt-operator — 負責安裝與升級所有元件</text>
  <path d="M330,100 C250,100 145,150 145,190" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-start="url(#arrow2)" marker-end="url(#arrow)"/>
  <text x="200" y="132" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">Watch / Update</text>
  <path d="M630,100 C710,100 815,150 815,190" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-start="url(#arrow2)" marker-end="url(#arrow)"/>
  <text x="760" y="132" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">Watch / Update</text>
  <path d="M815,345 L720,360" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="790" y="345" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">建立 Pod</text>
  <line x1="260" y1="490" x2="350" y2="490" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="305" y="482" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">Unix Socket</text>
  <path d="M145,345 L145,420" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="95" y="382" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3b82f6">Console Proxy</text>
  <text x="480" y="22" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#6b7280" letter-spacing="0.5">KUBEVIRT 整體架構</text>
</svg>
