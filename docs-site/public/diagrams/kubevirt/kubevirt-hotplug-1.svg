<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900px" version="1.1" width="1400px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><polygon fill="#3b82f6" points="0,0.5 8.5,3.5 0,6.5" /></defs><rect fill="#ffffff" height="100%" width="100%" x="0" y="0" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle" x="700" y="40">PVC Hotplug 掛載流程</text><rect fill="#eff6ff" height="60" rx="6" stroke="#bfdbfe" stroke-width="2" width="160" x="20" y="100" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="100" y="130">使用者</text><line stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1.5" x1="100" x2="100" y1="160" y2="850" /><rect fill="#eff6ff" height="60" rx="6" stroke="#bfdbfe" stroke-width="2" width="160" x="220" y="100" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="300" y="130">Kubernetes</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="300" y="145">API</text><line stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1.5" x1="300" x2="300" y1="160" y2="850" /><rect fill="#eff6ff" height="60" rx="6" stroke="#bfdbfe" stroke-width="2" width="160" x="420" y="100" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="500" y="130">virt-controller</text><line stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1.5" x1="500" x2="500" y1="160" y2="850" /><rect fill="#eff6ff" height="60" rx="6" stroke="#bfdbfe" stroke-width="2" width="160" x="670" y="100" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="750" y="130">Hotplug Pod</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="750" y="145">(attacher)</text><line stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1.5" x1="750" x2="750" y1="160" y2="850" /><rect fill="#eff6ff" height="60" rx="6" stroke="#bfdbfe" stroke-width="2" width="160" x="920" y="100" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="1000" y="130">virt-handler</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="1000" y="145">(節點)</text><line stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1.5" x1="1000" x2="1000" y1="160" y2="850" /><rect fill="#eff6ff" height="60" rx="6" stroke="#bfdbfe" stroke-width="2" width="160" x="1170" y="100" /><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="1250" y="130">QEMU/libvirt</text><text fill="#111827" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" text-anchor="middle" x="1250" y="145">(VM)</text><line stroke="#e5e7eb" stroke-dasharray="4,4" stroke-width="1.5" x1="1250" x2="1250" y1="160" y2="850" /><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="100" x2="300" y1="200" y2="200" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="200" y="190">virtctl addvolume vm-name</text><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="200" y="205">--volume-name=my-pvc</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="300" x2="500" y1="260" y2="260" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="400" y="250">VMI 狀態更新（新增 volume 請求）</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="500" x2="300" y1="340" y2="340" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="400" y="320">建立 Hotplug Pod</text><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="9" text-anchor="middle" x="400" y="335">（掛載 PVC，等待 PVC 就緒）</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="300" x2="750" y1="400" y2="400" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="525" y="390">調度 Hotplug Pod 到 VM 所在節點</text><rect fill="#f0f4ff" height="40" stroke="#c7d2fe" stroke-width="1.5" width="20" x="740" y="460" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" x="900" y="480">掛載 PVC 到 Hotplug Pod</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-dasharray="4,4" stroke-width="2" x1="750" x2="300" y1="530" y2="530" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="525" y="520">Hotplug Pod 變為 Ready</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="1000" x2="300" y1="610" y2="610" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="650" y="600">偵測到 Hotplug Pod 就緒</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="1000" x2="1250" y1="670" y2="670" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="9" text-anchor="middle" x="1125" y="650">透過 libvirt domain XML 更新</text><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="9" text-anchor="middle" x="1125" y="665">執行 qemu device_add</text><rect fill="#f0f4ff" height="40" stroke="#c7d2fe" stroke-width="1.5" width="20" x="1240" y="730" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="end" x="1100" y="750">SCSI 設備 attach 到 VM</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-dasharray="4,4" stroke-width="2" x1="1250" x2="1000" y1="800" y2="800" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="1125" y="790">device_add 成功</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-width="2" x1="1000" x2="300" y1="870" y2="870" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="650" y="860">更新 VMI status.volumeStatus</text><line marker-end="url(#arrow)" stroke="#3b82f6" stroke-dasharray="4,4" stroke-width="2" x1="300" x2="100" y1="930" y2="930" /><text fill="#6b7280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" text-anchor="middle" x="200" y="920">VMI status 顯示磁碟 Ready</text></svg>