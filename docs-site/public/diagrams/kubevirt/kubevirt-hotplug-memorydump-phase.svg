<svg xmlns="http://www.w3.org/2000/svg" width="920" height="280" viewBox="0 0 920 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5,8.5 3.5,0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="920" height="280" fill="#ffffff"/>
  <text x="460" y="32" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">MemoryDump Phase 狀態轉換</text>

  <circle cx="60" cy="140" r="10" fill="#111827"/>

  <rect x="125" y="118" width="170" height="44" rx="20" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/><text x="210" y="145" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Dissociating</text>
  <rect x="345" y="118" width="170" height="44" rx="20" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/><text x="430" y="145" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">InProgress</text>
  <rect x="595" y="68" width="170" height="44" rx="20" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/><text x="680" y="95" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Completed</text>
  <rect x="595" y="168" width="170" height="44" rx="20" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/><text x="680" y="195" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Failed</text>

  <line x1="70" y1="140" x2="125" y2="140" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="100" y="128" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">virtctl memorydump get</text>
  <line x1="295" y1="140" x2="345" y2="140" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="320" y="128" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">PVC hot-attach 完成</text>
  <line x1="515" y1="128" x2="595" y2="102" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="555" y="104" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">傾印完成</text>
  <line x1="515" y1="152" x2="595" y2="178" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="555" y="196" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">傾印失敗</text>
  <line x1="765" y1="90" x2="850" y2="90" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="808" y="78" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">PVC 自動 hot-detach</text>

  <circle cx="880" cy="90" r="13" fill="#ffffff" stroke="#111827" stroke-width="2.5"/>
  <circle cx="880" cy="90" r="8" fill="#111827"/>

  <rect x="300" y="220" width="300" height="28" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="450" y="238" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">InProgress 期間 VM 仍持續運行，MemoryDump 完成後會自動 hot-detach。</text>
</svg>
