<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
  </marker>
</defs>

<rect width="1100" height="650" fill="#ffffff"/>

<!-- Start -->
<rect x="50" y="30" width="180" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
<text x="140" y="55" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">舊版 CRD</text>
<text x="140" y="75" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">v1alpha3 storage</text>

<!-- Arrow to upgrade -->
<line x1="230" y1="60" x2="300" y2="60" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="300" y="30" width="150" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
<text x="375" y="65" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">升級 KubeVirt</text>

<!-- Arrow to new CRD -->
<line x1="450" y1="60" x2="520" y2="60" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="520" y="30" width="180" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
<text x="610" y="55" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">新版 CRD</text>
<text x="610" y="75" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">v1 storage</text>

<!-- Decision -->
<line x1="610" y1="90" x2="610" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M 610 150 L 740 210 L 610 270 L 480 210 Z" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<text x="610" y="205" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">舊版物件是否</text>
<text x="610" y="220" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">自動遷移？</text>

<!-- Yes path: auto migration -->
<line x1="740" y1="210" x2="850" y2="210" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="770" y="200" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">是（大多數情況）</text>
<rect x="850" y="170" width="200" height="80" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
<text x="950" y="200" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">KubeVirt 自動</text>
<text x="950" y="220" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">轉換 API 版本</text>

<!-- No path: manual migration -->
<line x1="480" y1="210" x2="320" y2="210" stroke="#3b82f6" stroke-width="2"/>
<line x1="320" y1="210" x2="320" y2="340" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<text x="370" y="200" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">否（重大 schema 變更）</text>

<rect x="200" y="340" width="240" height="90" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
<text x="320" y="370" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">使用</text>
<text x="320" y="390" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">kube-storage-version-migrator</text>
<text x="320" y="410" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">手動觸發遷移</text>

<!-- Verify -->
<line x1="320" y1="430" x2="320" y2="500" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="200" y="500" width="240" height="80" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
<text x="320" y="530" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">驗證所有物件</text>
<text x="320" y="550" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">使用新版 storage</text>

</svg>