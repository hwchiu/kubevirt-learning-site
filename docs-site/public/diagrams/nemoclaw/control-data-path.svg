<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <style>
    .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:10; }
    .t { font-family:Arial,sans-serif; font-size:18px; fill:#0f172a; }
    .s { font-family:Arial,sans-serif; font-size:14px; fill:#334155; }
    .arrowC { stroke:#0ea5e9; stroke-width:3; marker-end:url(#m1); }
    .arrowD { stroke:#f97316; stroke-width:3; marker-end:url(#m2); }
  </style>
  <defs>
    <marker id="m1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0ea5e9" /></marker>
    <marker id="m2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316" /></marker>
  </defs>
  <text class="s" x="80" y="30">控制路徑（藍色）</text>
  <rect class="box" x="80" y="50" width="190" height="70"/><text class="t" x="108" y="92">nemoclaw CLI</text>
  <rect class="box" x="330" y="50" width="210" height="70"/><text class="t" x="356" y="92">OpenShell Gateway</text>
  <rect class="box" x="600" y="50" width="190" height="70"/><text class="t" x="632" y="92">Supervisor</text>
  <line class="arrowC" x1="270" y1="85" x2="330" y2="85"/>
  <line class="arrowC" x1="540" y1="85" x2="600" y2="85"/>

  <text class="s" x="80" y="178">資料路徑（橘色）</text>
  <rect class="box" x="80" y="200" width="190" height="80"/><text class="t" x="115" y="246">OpenClaw/Hermes</text>
  <rect class="box" x="320" y="200" width="190" height="80"/><text class="t" x="348" y="246">Policy Proxy</text>
  <rect class="box" x="560" y="200" width="210" height="80"/><text class="t" x="586" y="246">Inference Router</text>
  <rect class="box" x="820" y="200" width="280" height="80"/><text class="t" x="880" y="246">LLM / External APIs</text>
  <line class="arrowD" x1="270" y1="240" x2="320" y2="240"/>
  <line class="arrowD" x1="510" y1="240" x2="560" y2="240"/>
  <line class="arrowD" x1="770" y1="240" x2="820" y2="240"/>
</svg>
