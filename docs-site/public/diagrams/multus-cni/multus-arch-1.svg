<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="1600" height="1200" fill="#ffffff"/>

  <!-- Title -->
  <text x="800" y="40" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#111827" text-anchor="middle" font-weight="600">Multus CNI 系統架構</text>

  <!-- Kubernetes Node Container -->
  <rect x="50" y="80" width="1300" height="900" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="700" y="110" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle" font-weight="500">Kubernetes Node</text>

  <!-- Thin Plugin Mode Container -->
  <rect x="80" y="140" width="400" height="200" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="280" y="165" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="500">Thin Plugin 模式</text>

  <!-- kubelet/CRI -->
  <rect x="100" y="190" width="160" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="180" y="223" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">kubelet / CRI</text>

  <!-- multus binary -->
  <rect x="300" y="190" width="160" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="213" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">multus binary</text>
  <text x="380" y="233" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">/opt/cni/bin/multus</text>

  <!-- K8S API (Thin) -->
  <rect x="300" y="270" width="160" height="50" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="295" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Kubernetes</text>
  <text x="380" y="310" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">API Server</text>

  <!-- Arrows for Thin Plugin -->
  <line x1="260" y1="220" x2="295" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="277" y="210" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">呼叫 CNI</text>

  <line x1="380" y1="250" x2="380" y2="265" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="260" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">直接讀取 kubeconfig</text>

  <!-- Thick Plugin Mode Container -->
  <rect x="520" y="140" width="500" height="340" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="770" y="165" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="500">Thick Plugin 模式（推薦）</text>

  <!-- kubelet/CRI 2 -->
  <rect x="540" y="190" width="160" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="620" y="223" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">kubelet / CRI</text>

  <!-- multus-shim -->
  <rect x="740" y="190" width="160" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="820" y="213" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">multus-shim binary</text>
  <text x="820" y="233" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">/opt/cni/bin/multus</text>

  <!-- multus-daemon -->
  <rect x="740" y="280" width="260" height="80" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="870" y="310" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">multus-daemon</text>
  <text x="870" y="330" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">DaemonSet Pod</text>
  <text x="870" y="350" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Pod Informer | NAD Informer</text>

  <!-- K8S API (Thick) -->
  <rect x="560" y="400" width="160" height="50" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="425" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Kubernetes</text>
  <text x="640" y="440" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">API Server</text>

  <!-- Arrows for Thick Plugin -->
  <line x1="700" y1="220" x2="735" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="717" y="210" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">呼叫 CNI</text>

  <line x1="820" y1="250" x2="820" y2="275" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="920" y="265" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">HTTP over Unix Socket</text>

  <line x1="740" y1="320" x2="725" y2="320" stroke="#3b82f6" stroke-width="2"/>
  <line x1="725" y1="320" x2="725" y2="425" stroke="#3b82f6" stroke-width="2"/>
  <line x1="725" y1="425" x2="720" y2="425" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="370" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280">共用 k8s 客戶端</text>

  <!-- CNI Delegation Container -->
  <rect x="80" y="520" width="940" height="240" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="550" y="545" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="500">CNI 委派（兩種模式共用）</text>

  <!-- Multus Core Logic -->
  <rect x="100" y="570" width="180" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="190" y="603" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Multus 核心邏輯</text>

  <!-- CNI Plugin 1 -->
  <rect x="350" y="570" width="150" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="425" y="593" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">CNI Plugin 1</text>
  <text x="425" y="613" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">e.g. bridge</text>

  <!-- CNI Plugin 2 -->
  <rect x="540" y="570" width="150" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="615" y="593" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">CNI Plugin 2</text>
  <text x="615" y="613" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">e.g. sriov</text>

  <!-- CNI Plugin N -->
  <rect x="730" y="570" width="150" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="805" y="593" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">CNI Plugin N</text>
  <text x="805" y="613" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">e.g. macvlan</text>

  <!-- Delegation Arrows -->
  <line x1="280" y1="600" x2="345" y2="600" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="312" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">呼叫 delegate</text>

  <line x1="190" y1="630" x2="190" y2="680" stroke="#3b82f6" stroke-width="2"/>
  <line x1="190" y1="680" x2="615" y2="680" stroke="#3b82f6" stroke-width="2"/>
  <line x1="615" y1="680" x2="615" y2="635" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="695" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">呼叫 delegate</text>

  <line x1="190" y1="630" x2="190" y2="720" stroke="#3b82f6" stroke-width="2"/>
  <line x1="190" y1="720" x2="805" y2="720" stroke="#3b82f6" stroke-width="2"/>
  <line x1="805" y1="720" x2="805" y2="635" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="735" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">呼叫 delegate</text>

  <!-- Control Plane Container -->
  <rect x="1100" y="140" width="220" height="340" rx="6" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="1210" y="165" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="500">Kubernetes Control Plane</text>

  <!-- NAD -->
  <rect x="1120" y="200" width="180" height="70" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1210" y="228" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">NetworkAttachment</text>
  <text x="1210" y="245" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Definition</text>
  <text x="1210" y="260" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">CRD</text>

  <!-- Pod -->
  <rect x="1120" y="300" width="180" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1210" y="323" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Pod</text>
  <text x="1210" y="343" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Annotation</text>

  <!-- K8S API Server (main) -->
  <rect x="1120" y="390" width="180" height="60" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1210" y="413" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Kubernetes</text>
  <text x="1210" y="433" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">API Server</text>

  <!-- Connecting lines for Control Plane -->
  <line x1="1210" y1="270" x2="1210" y2="295" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="1210" y1="360" x2="1210" y2="385" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Connection from Thin Plugin to Control Plane -->
  <path d="M 460,295 Q 780,295 1115,420" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,5"/>

  <!-- Connection from Thick Plugin to Control Plane -->
  <path d="M 720,425 Q 920,425 1115,425" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>