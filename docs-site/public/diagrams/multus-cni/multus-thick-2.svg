<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <marker id="arrowReturn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1400" height="1000" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="40" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#111827" text-anchor="middle" font-weight="600">Shim 通訊流程</text>

  <!-- Lifelines -->
  <!-- kubelet -->
  <rect x="80" y="80" width="160" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="160" y="115" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">kubelet</text>
  <line x1="160" y1="140" x2="160" y2="850" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- multus-shim -->
  <rect x="340" y="80" width="200" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="440" y="100" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">multus-shim</text>
  <text x="440" y="125" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">CNI Binary</text>
  <line x1="440" y1="140" x2="440" y2="850" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- multus-daemon -->
  <rect x="680" y="80" width="220" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="790" y="100" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">multus-daemon</text>
  <text x="790" y="125" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">HTTP Server</text>
  <line x1="790" y1="140" x2="790" y2="850" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Messages -->
  <!-- 1. CNI ADD call -->
  <line x1="160" y1="180" x2="435" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="297" y="165" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">呼叫 CNI ADD</text>
  <text x="297" y="200" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">（環境變數 + stdin）</text>

  <!-- 2. Encapsulate request -->
  <rect x="350" y="220" width="180" height="70" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="440" y="245" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">封裝 CNI 請求</text>
  <text x="440" y="265" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">為 HTTP JSON</text>

  <!-- 3. POST to daemon -->
  <line x1="440" y1="310" x2="785" y2="310" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="612" y="295" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">POST /cni</text>
  <text x="612" y="330" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">&#123;Env: &#123;...&#125;, Config: &#123;...&#125;&#125;</text>
  <text x="612" y="345" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">（Unix Socket）</text>

  <!-- 4. Parse request -->
  <rect x="700" y="370" width="180" height="70" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="790" y="395" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">解析請求，</text>
  <text x="790" y="415" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">取得 K8sArgs</text>

  <!-- 5. Query Informer -->
  <rect x="700" y="460" width="180" height="70" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="790" y="485" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">從 Informer 快取</text>
  <text x="790" y="505" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">查詢 Pod/NAD</text>

  <!-- 6. Execute CNI delegation -->
  <rect x="700" y="550" width="180" height="90" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="790" y="575" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#111827" text-anchor="middle">執行 CNI 委派</text>
  <text x="790" y="595" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">（呼叫各個</text>
  <text x="790" y="615" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">CNI Binary）</text>

  <!-- 7. Return result -->
  <line x1="785" y1="680" x2="445" y2="680" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrowReturn)"/>
  <text x="615" y="670" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">HTTP 200 + CNI 結果 JSON</text>

  <!-- 8. Return to kubelet -->
  <line x1="435" y1="730" x2="165" y2="730" stroke="#6b7280" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrowReturn)"/>
  <text x="300" y="720" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">輸出 CNI 結果（stdout）</text>

  <!-- Info box -->
  <rect x="50" y="800" width="1300" height="160" rx="8" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="700" y="835" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle" font-weight="600">關鍵資訊</text>
  
  <text x="70" y="870" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">• multus-shim 是輕量的 CNI Binary，僅約 50 行程式碼，負責轉發請求至 multus-daemon</text>
  <text x="70" y="895" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">• 通訊協定：JSON over Unix Socket HTTP（/run/multus/multus.sock）</text>
  <text x="70" y="920" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">• multus-daemon 透過 Informer 快取避免每次 CNI 呼叫都向 API Server 發送請求</text>
  <text x="70" y="945" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">• 實作位於 pkg/server/api/shim.go 和 pkg/server/api/api.go</text>
</svg>