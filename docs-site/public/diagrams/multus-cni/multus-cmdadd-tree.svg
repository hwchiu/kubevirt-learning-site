  <rect x="280" y="340" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="358" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">k8s.GetPodNetwork()</text>
  <text x="294" y="374" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">解析 k8s.v1.cni.cncf.io/networks</text>
  <line x1="130" y1="122" x2="280" y2="361" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="392" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="410" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">k8s.GetAllDelegates()</text>
  <text x="294" y="426" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">取得所有委派設定</text>
  <line x1="130" y1="122" x2="280" y2="413" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="272" y="440" width="506" height="176" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="284" y="456" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#ca8a04" letter-spacing="0.5">迴圈處理每個 DELEGATENETCONF</text>
  <rect x="280" y="444" width="490" height="42" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
  <text x="294" y="462" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">validateIfName()</text>
  <text x="294" y="478" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">驗證介面名稱不重複</text>
  <rect x="280" y="496" width="490" height="42" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
  <text x="294" y="514" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">DelegateAdd()</text>
  <text x="294" y="530" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">呼叫委派外掛</text>
  <rect x="280" y="548" width="490" height="42" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1.5"/>
  <text x="294" y="566" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">nadutils.SaveNetworkStatus()</text>
  <text x="294" y="582" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">更新網路狀態 Annotation</text>
  <rect x="280" y="608" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="626" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">saveDelegates()</text>
  <text x="294" y="642" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">儲存快取供 DEL 使用</text>
  <rect x="280" y="660" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="678" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">return result</text>
  <text x="294" y="694" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">回傳 eth0 的 CNI 結果</text>
  <line x1="130" y1="122" x2="130" y2="444" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
