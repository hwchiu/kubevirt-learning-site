<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
    <marker id="arrowbranch" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="820" height="600" fill="#ffffff"/>
  <text x="410" y="36" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Multus CNI — CmdAdd() 程式碼路徑</text>
  <text x="410" y="58" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="normal" fill="#6b7280">原始碼：pkg/multus/multus.go</text>
  <rect x="40" y="80" width="180" height="42" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="107" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">CmdAdd()</text>
  <rect x="280" y="80" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="98" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">types.LoadNetConf()</text>
  <text x="294" y="114" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">載入 multus 設定</text>
  <line x1="130" y1="122" x2="280" y2="101" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="132" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="150" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">logging.SetLogLevel()</text>
  <text x="294" y="166" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">設定日誌等級</text>
  <line x1="130" y1="122" x2="280" y2="153" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="184" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="202" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">types.GetReadinessIndicatorFile()</text>
  <text x="294" y="218" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">等待就緒指示檔</text>
  <line x1="130" y1="122" x2="280" y2="205" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="236" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="294" y="254" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1d4ed8">k8s.GetK8sClient()</text>
  <text x="294" y="270" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280">建立 k8s 客戶端</text>
  <line x1="130" y1="122" x2="280" y2="257" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="288" width="490" height="42" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
