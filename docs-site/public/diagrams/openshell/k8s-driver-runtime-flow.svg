<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <style>
    .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:10; }
    .t { font-family:Arial,sans-serif; font-size:18px; fill:#0f172a; }
    .s { font-family:Arial,sans-serif; font-size:14px; fill:#334155; }
    .arrow { stroke:#475569; stroke-width:2; marker-end:url(#m); }
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>
  <rect class="box" x="30" y="70" width="160" height="100"/><text class="t" x="90" y="120">CLI</text><text class="s" x="58" y="145">1. create request</text>
  <rect class="box" x="230" y="70" width="180" height="100"/><text class="t" x="270" y="118">Gateway API</text><text class="s" x="248" y="142">2-3. DB/identity</text>
  <rect class="box" x="450" y="70" width="210" height="100"/><text class="t" x="492" y="116">Kubernetes Driver</text><text class="s" x="468" y="140">4-6. PodSpec/PVC/sideload</text>
  <rect class="box" x="700" y="70" width="180" height="100"/><text class="t" x="730" y="118">K8s API Server</text><text class="s" x="725" y="142">7. create resources</text>
  <rect class="box" x="920" y="70" width="240" height="100"/><text class="t" x="978" y="116">Sandbox Pod</text><text class="s" x="940" y="140">8-9. supervisor connect</text>
  <line class="arrow" x1="190" y1="120" x2="230" y2="120"/>
  <line class="arrow" x1="410" y1="120" x2="450" y2="120"/>
  <line class="arrow" x1="660" y1="120" x2="700" y2="120"/>
  <line class="arrow" x1="880" y1="120" x2="920" y2="120"/>
  <text class="s" x="30" y="220">OpenShell Kubernetes Driver runtime flow: request → control plane persistence → K8s provisioning → supervisor bootstrap.</text>
</svg>
