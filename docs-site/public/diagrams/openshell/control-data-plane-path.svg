<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <style>
    .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:10; }
    .t { font-family:Arial,sans-serif; font-size:18px; fill:#0f172a; }
    .s { font-family:Arial,sans-serif; font-size:14px; fill:#334155; }
    .arrowC { stroke:#0ea5e9; stroke-width:3; marker-end:url(#m1); }
    .arrowD { stroke:#f97316; stroke-width:3; marker-end:url(#m2); }
  </style>
  <defs>
    <marker id="m1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0ea5e9" /></marker>
    <marker id="m2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316" /></marker>
  </defs>
  <rect class="box" x="80" y="50" width="160" height="70"/><text class="t" x="140" y="92">CLI</text>
  <rect class="box" x="310" y="50" width="180" height="70"/><text class="t" x="350" y="92">Gateway</text>
  <rect class="box" x="560" y="50" width="200" height="70"/><text class="t" x="608" y="92">Supervisor</text>
  <line class="arrowC" x1="240" y1="85" x2="310" y2="85"/>
  <line class="arrowC" x1="490" y1="85" x2="560" y2="85"/>
  <text class="s" x="80" y="32">控制流（藍色）：lifecycle / policy / relay</text>

  <rect class="box" x="80" y="200" width="210" height="80"/><text class="t" x="116" y="245">Agent Process</text>
  <rect class="box" x="340" y="200" width="190" height="80"/><text class="t" x="362" y="245">Policy Proxy</text>
  <rect class="box" x="580" y="200" width="210" height="80"/><text class="t" x="600" y="245">Inference Router</text>
  <rect class="box" x="840" y="200" width="250" height="80"/><text class="t" x="905" y="245">External APIs / LLM</text>
  <line class="arrowD" x1="290" y1="240" x2="340" y2="240"/>
  <line class="arrowD" x1="530" y1="240" x2="580" y2="240"/>
  <line class="arrowD" x1="790" y1="240" x2="840" y2="240"/>
  <text class="s" x="80" y="182">資料流（橘色）：egress / inference.local requests</text>
</svg>
