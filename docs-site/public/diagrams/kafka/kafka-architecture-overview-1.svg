<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <rect width="1200" height="900" fill="#ffffff"/>
  
  <!-- Producers Container -->
  <rect x="50" y="50" width="240" height="160" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2" rx="8"/>
  <text x="170" y="80" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">生產者應用程式</text>
  <rect x="70" y="100" width="200" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="170" y="130" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Producer App 1</text>
  <rect x="70" y="160" width="200" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="170" y="190" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Producer App 2</text>
  
  <!-- Kafka Cluster Container -->
  <rect x="350" y="50" width="500" height="520" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2" rx="8"/>
  <text x="600" y="80" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Kafka 叢集 (KRaft 模式)</text>
  
  <!-- Controller Quorum Container -->
  <rect x="380" y="100" width="440" height="180" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="6"/>
  <text x="600" y="125" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">Controller Quorum (Raft)</text>
  <rect x="400" y="140" width="120" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="460" y="170" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Controller 1</text>
  <text x="460" y="185" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Active</text>
  <rect x="540" y="140" width="120" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="600" y="170" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Controller 2</text>
  <text x="600" y="185" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Standby</text>
  <rect x="680" y="140" width="120" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="740" y="170" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Controller 3</text>
  <text x="740" y="185" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Standby</text>
  
  <!-- Broker Nodes Container -->
  <rect x="380" y="300" width="440" height="250" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="6"/>
  <text x="600" y="325" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">Broker 節點</text>
  <rect x="400" y="345" width="120" height="60" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="460" y="370" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Broker 1</text>
  <text x="460" y="388" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Leader</text>
  <text x="460" y="400" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Partitions</text>
  <rect x="540" y="345" width="120" height="60" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="600" y="370" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Broker 2</text>
  <text x="600" y="388" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Follower</text>
  <text x="600" y="400" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Partitions</text>
  <rect x="680" y="345" width="120" height="60" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="740" y="370" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827" text-anchor="middle">Broker 3</text>
  <text x="740" y="388" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Follower</text>
  <text x="740" y="400" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Partitions</text>
  
  <!-- Metadata Replication Arrow -->
  <path d="M 600 280 L 600 330" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="620" y="310" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Metadata</text>
  <text x="620" y="325" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Replication</text>
  
  <!-- Consumers Container -->
  <rect x="910" y="50" width="240" height="160" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2" rx="8"/>
  <text x="1030" y="80" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">消費者應用程式</text>
  <rect x="930" y="100" width="200" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="1030" y="130" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Consumer Group A</text>
  <rect x="930" y="160" width="200" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="1030" y="190" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Consumer Group B</text>
  
  <!-- Connect Container -->
  <rect x="50" y="260" width="240" height="160" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2" rx="8"/>
  <text x="170" y="290" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Kafka Connect</text>
  <rect x="70" y="310" width="200" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="170" y="340" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Source Connector</text>
  <rect x="70" y="370" width="200" height="50" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="170" y="400" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Sink Connector</text>
  
  <!-- Streams Container -->
  <rect x="50" y="470" width="240" height="100" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="2" rx="8"/>
  <text x="170" y="500" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Kafka Streams</text>
  <rect x="70" y="520" width="200" height="40" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="6"/>
  <text x="170" y="545" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#111827" text-anchor="middle">Streams Application</text>
  
  <!-- Arrows: Producers to Brokers -->
  <path d="M 290 125 L 400 360" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="335" y="240" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Produce</text>
  <path d="M 290 185 L 540 360" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="400" y="280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Produce</text>
  
  <!-- Arrows: Source Connector to Broker -->
  <path d="M 290 335 L 400 370" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="335" y="355" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Produce</text>
  
  <!-- Arrows: Brokers to Consumers -->
  <path d="M 520 360 L 930 125" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="720" y="235" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Consume</text>
  <path d="M 660 360 L 930 185" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="780" y="280" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Consume</text>
  
  <!-- Arrows: Broker to Sink Connector -->
  <path d="M 680 380 L 680 450 L 290 395" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="425" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Consume</text>
  
  <!-- Arrows: Broker to Streams and back -->
  <path d="M 400 405 L 290 540" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="335" y="470" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Read/Write</text>
  <path d="M 170 570 L 170 640 L 600 640 L 600 405" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="380" y="660" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6b7280">Produce Results</text>
</svg>