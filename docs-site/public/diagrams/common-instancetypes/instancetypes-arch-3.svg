<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background:#ffffff; font-family:-apple-system, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0.5, 8.5 3.5, 0 6.5" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Box: BASE -->
  <rect x="350" y="50" width="300" height="70" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="500" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">base/</text>
  <text x="500" y="93" text-anchor="middle" font-size="11" fill="#6b7280">空白 VirtualMachineClusterPreference</text>
  <text x="500" y="108" text-anchor="middle" font-size="11" fill="#6b7280">+ vendor label</text>
  
  <!-- Box: LINUX -->
  <rect x="200" y="180" width="200" height="90" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="300" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">linux/</text>
  <text x="300" y="225" text-anchor="middle" font-size="11" fill="#6b7280">+ diskbus-virtio-blk</text>
  <text x="300" y="242" text-anchor="middle" font-size="11" fill="#6b7280">+ interfacemodel-virtio-net</text>
  <text x="300" y="259" text-anchor="middle" font-size="11" fill="#6b7280">+ rng</text>
  
  <!-- Box: WINDOWS -->
  <rect x="600" y="180" width="200" height="90" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="700" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">windows/</text>
  <text x="700" y="222" text-anchor="middle" font-size="10" fill="#6b7280">（獨立繼承鏈）</text>
  <text x="700" y="240" text-anchor="middle" font-size="11" fill="#6b7280">+ hyperv + efi</text>
  <text x="700" y="257" text-anchor="middle" font-size="11" fill="#6b7280">+ tablet-usb</text>
  
  <!-- Box: ALPINE -->
  <rect x="50" y="330" width="160" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="130" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">alpine/</text>
  <text x="130" y="373" text-anchor="middle" font-size="10" fill="#6b7280">+ metadata</text>
  <text x="130" y="388" text-anchor="middle" font-size="10" fill="#6b7280">(icon, name)</text>
  <text x="130" y="403" text-anchor="middle" font-size="10" fill="#6b7280">+ requirements (1 CPU, 512Mi)</text>
  
  <!-- Box: UBUNTU -->
  <rect x="230" y="330" width="160" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="310" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">ubuntu/</text>
  <text x="310" y="375" text-anchor="middle" font-size="10" fill="#6b7280">+ metadata</text>
  <text x="310" y="393" text-anchor="middle" font-size="10" fill="#6b7280">+ requirements</text>
  
  <!-- Box: FEDORA -->
  <rect x="410" y="330" width="160" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="490" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">fedora/</text>
  <text x="490" y="375" text-anchor="middle" font-size="10" fill="#6b7280">+ metadata</text>
  <text x="490" y="393" text-anchor="middle" font-size="10" fill="#6b7280">+ requirements</text>
  
  <!-- Arrows -->
  <!-- BASE -> LINUX -->
  <path d="M 450 120 Q 350 150 300 180" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- BASE -> WINDOWS -->
  <path d="M 550 120 Q 650 150 700 180" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  
  <!-- LINUX -> ALPINE -->
  <path d="M 250 270 Q 180 300 130 330" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- LINUX -> UBUNTU -->
  <path d="M 300 270 L 310 330" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- LINUX -> FEDORA -->
  <path d="M 350 270 Q 420 300 490 330" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>